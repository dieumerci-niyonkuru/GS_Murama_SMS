<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - G.S. Murama</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f0f2f5}
        header{background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;padding:15px 40px;display:flex;justify-content:space-between;align-items:center}
        .logo h2{font-size:22px}
        .user-info{display:flex;align-items:center;gap:15px}
        .logout-btn{background:#dc3545;padding:8px 16px;border-radius:5px;cursor:pointer;border:none;color:white}
        .container{max-width:1400px;margin:20px auto;padding:0 20px}
        .nav-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
        .nav-btn{background:#2a5298;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer}
        .nav-btn:hover{background:#1e3c72}
        .content{background:white;border-radius:10px;padding:20px;min-height:500px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:white;padding:20px;border-radius:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
        .stat-number{font-size:2em;color:#2a5298;font-weight:bold}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #ddd}
        th{background:#f0f0f0}
        form label{display:block;margin-top:10px;font-weight:bold}
        form input, form select{width:100%;padding:8px;margin:5px 0}
        button[type=submit]{background:#28a745;margin-top:10px}
        footer{background:#1e3c72;color:white;text-align:center;padding:15px;margin-top:40px}
    </style>
</head>
<body>
<header>
    <div class="logo"><h2>🏫 G.S. Murama | Digital Management System</h2></div>
    <div class="user-info"><span id="userName"></span><button class="logout-btn" onclick="logout()">Logout</button></div>
</header>
<div class="container">
    <div id="roleButtons" class="nav-buttons"></div>
    <div id="content" class="content">Loading dashboard...</div>
</div>
<footer><p>© 2026 G.S. Murama – Kisaro, Rwanda | Secure Role‑Based Access</p></footer>
<script>
const API_BASE = 'http://localhost:8000/api';
let user = null;
let permissions = null;

function checkAuth() {
    const token = localStorage.getItem('token');
    user = JSON.parse(localStorage.getItem('user'));
    if(!token || !user) window.location.href = 'login.html';
    permissions = user.permissions;
    document.getElementById('userName').innerHTML = `${user.full_name} (${user.role})`;
}

function buildNavButtons() {
    const container = document.getElementById('roleButtons');
    const btns = [];
    if(permissions.can_manage_students) btns.push({name:'Students', action:'showStudents'});
    if(permissions.can_manage_fees) btns.push({name:'Fees', action:'showFees'});
    if(permissions.can_manage_courses) btns.push({name:'Courses', action:'showCourses'});
    if(permissions.can_manage_attendance) btns.push({name:'Attendance', action:'showAttendance'});
    if(permissions.can_manage_teachers) btns.push({name:'Teachers', action:'showTeachers'});
    if(permissions.can_view_reports) btns.push({name:'Reports', action:'showReports'});
    if(permissions.can_manage_budget) btns.push({name:'Budget', action:'showBudget'});
    if(permissions.can_manage_discipline) btns.push({name:'Discipline', action:'showDiscipline'});
    if(btns.length===0) btns.push({name:'Dashboard', action:'showDashboard'});
    container.innerHTML = btns.map(b => `<button class="nav-btn" onclick="${b.action}()">${b.name}</button>`).join('');
}

async function fetchStats() {
    const res = await fetch(`${API_BASE}/dashboard_stats.php`);
    const data = await res.json();
    if(data.success) {
        document.getElementById('content').innerHTML = `
            <h2>Dashboard</h2>
            <div class="stats">
                <div class="stat-card"><h3>Total Students</h3><div class="stat-number">${data.totalStudents}</div></div>
                <div class="stat-card"><h3>Fees Collected</h3><div class="stat-number">${data.totalFees || 0} RWF</div></div>
                <div class="stat-card"><h3>Teachers</h3><div class="stat-number">${data.totalTeachers}</div></div>
                <div class="stat-card"><h3>Library Books</h3><div class="stat-number">${data.totalBooks}</div></div>
            </div>
            <p>Welcome to the G.S. Murama Digital Management System. Use the buttons above to manage your role‑specific tasks.</p>
        `;
    }
}

async function showDashboard() { await fetchStats(); }

async function showStudents() {
    const res = await fetch(`${API_BASE}/students.php`, {headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
    const data = await res.json();
    if(data.success && data.data.length) {
        let html = '<h2>Student Management</h2><button onclick="showAddStudentForm()" style="margin-bottom:10px">+ Add Student</button></table><th>Student ID</th><th>Name</th><th>Level</th><th>Class</th><th>Parent Phone</th><th>Actions</th></tr>';
        data.data.forEach(s => {
            html += `<tr>
                        <td>${s.student_id}</td>
                        <td>${s.first_name} ${s.last_name}</td>
                        <td>${s.level}</td>
                        <td>${s.class}</td>
                        <td>${s.parent_phone||'-'}</td>
                        <td><button onclick="editStudent(${s.id})">Edit</button> <button onclick="deleteStudent(${s.id})">Delete</button></td>
                     </tr>`;
        });
        html += '</table>';
        document.getElementById('content').innerHTML = html;
    } else {
        document.getElementById('content').innerHTML = '<h2>Students</h2><button onclick="showAddStudentForm()">+ Add Student</button><p>No students found.</p>';
    }
}

function showAddStudentForm() {
    document.getElementById('content').innerHTML = `
        <h2>Add New Student</h2>
        <form id="studentForm">
            <label>First Name</label><input type="text" id="first_name" required>
            <label>Last Name</label><input type="text" id="last_name" required>
            <label>Level</label><select id="level"><option>Nursery</option><option>Primary</option><option>Secondary</option></select>
            <label>Class</label><input type="text" id="class" required>
            <label>Parent Phone</label><input type="text" id="parent_phone">
            <label>Parent Email</label><input type="email" id="parent_email">
            <label>Address</label><textarea id="address"></textarea>
            <button type="submit">Save Student</button>
        </form>
    `;
    document.getElementById('studentForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            level: document.getElementById('level').value,
            class: document.getElementById('class').value,
            parent_phone: document.getElementById('parent_phone').value,
            parent_email: document.getElementById('parent_email').value,
            address: document.getElementById('address').value
        };
        const res = await fetch(`${API_BASE}/students.php`, {
            method: 'POST',
            headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+localStorage.getItem('token')},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if(result.success) alert('Student added');
        showStudents();
    };
}

async function deleteStudent(id) {
    if(confirm('Delete student?')) {
        await fetch(`${API_BASE}/students.php?id=${id}`, {method:'DELETE', headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
        showStudents();
    }
}

async function showFees() {
    const res = await fetch(`${API_BASE}/fees.php`);
    const data = await res.json();
    let html = '<h2>Fee Management</h2><button onclick="showAddFeeForm()">Record Payment</button>';
    if(data.success && data.data.length) {
        html += '<table><th>Student</th><th>Amount</th><th>Paid</th><th>Balance</th><th>Term</th><th>Receipt</th></tr>';
        data.data.forEach(f => {
            html += `<tr><td>${f.first_name} ${f.last_name}</td><td>${f.amount}</td><td>${f.paid_amount}</td><td>${f.balance}</td><td>${f.term}</td><td>${f.receipt_number}</td></tr>`;
        });
        html += '</table>';
    } else html += '<p>No fee records.</p>';
    document.getElementById('content').innerHTML = html;
}

function showAddFeeForm() {
    document.getElementById('content').innerHTML = `
        <h2>Record Fee Payment</h2>
        <form id="feeForm">
            <label>Student ID</label><input type="text" id="student_id" required>
            <label>Amount (RWF)</label><input type="number" id="amount" required>
            <label>Paid Amount</label><input type="number" id="paid_amount" required>
            <label>Term</label><input type="text" id="term" placeholder="Term 1/2/3">
            <label>Payment Method</label><select id="method"><option>Cash</option><option>Mobile Money</option><option>Bank Transfer</option></select>
            <button type="submit">Save Payment</button>
        </form>
    `;
    document.getElementById('feeForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            student_id: document.getElementById('student_id').value,
            amount: document.getElementById('amount').value,
            paid_amount: document.getElementById('paid_amount').value,
            term: document.getElementById('term').value,
            method: document.getElementById('method').value
        };
        const res = await fetch(`${API_BASE}/fees.php`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
        const result = await res.json();
        if(result.success) alert('Payment recorded. Receipt: '+result.receipt);
        showFees();
    };
}

async function showCourses() { document.getElementById('content').innerHTML = '<h2>Course Management</h2><p>Teachers can upload notes, assignments, and marks.</p>'; }
async function showAttendance() { document.getElementById('content').innerHTML = '<h2>Attendance Tracking</h2><p>Mark student attendance daily.</p>'; }
async function showTeachers() { document.getElementById('content').innerHTML = '<h2>Teacher Management</h2><p>View and manage teaching staff.</p>'; }
async function showReports() { document.getElementById('content').innerHTML = '<h2>Generate Reports</h2><p>PDF reports for fees, grades, attendance.</p>'; }
async function showBudget() { document.getElementById('content').innerHTML = '<h2>Budget Planning</h2><p>Financial planning and expenditure tracking.</p>'; }
async function showDiscipline() { document.getElementById('content').innerHTML = '<h2>Discipline Records</h2><p>Manage student behaviour records.</p>'; }

function logout() { localStorage.clear(); window.location.href = 'login.html'; }

checkAuth();
buildNavButtons();
showDashboard();
</script>
</body>
</html>
