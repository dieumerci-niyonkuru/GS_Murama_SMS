<!DOCTYPE html>
<html>
<head><title>Login - G.S. Murama</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI;background:linear-gradient(135deg,#1e3c72,#2a5298);height:100vh;display:flex;justify-content:center;align-items:center}
.container{background:white;border-radius:20px;padding:40px;width:400px}
h2{color:#1e3c72;margin-bottom:20px}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
button{width:100%;padding:12px;background:#2a5298;color:white;border:none;border-radius:8px;cursor:pointer}
.error{color:red;margin-top:10px}
</style></head>
<body>
<div class="container">
    <h2>🏫 G.S. Murama – Staff Login</h2>
    <p>Enter your SDMS Code and password</p>
    <div id="msg"></div>
    <form id="loginForm">
        <input type="text" id="sdms_code" placeholder="SDMS Code" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <button id="langToggle" class="mode-toggle" onclick="toggleLanguage()" style="width:auto; margin-top:10px">Kinyarwanda</button>
    <div style="margin-top:20px;font-size:12px;color:#888">First time? Use your SDMS Code to set a password.</div>
</div>
<script>
const API_BASE = 'http://localhost:8000/api';
document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const sdms = document.getElementById('sdms_code').value;
    const pwd = document.getElementById('password').value;
    try {
        const res = await fetch(`${API_BASE}/login.php`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({sdms_code: sdms, password: pwd})
        });
        const data = await res.json();
        if(data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';
        } else if(data.requires_setup) {
            window.location.href = `setup.html?code=${data.sdms_code}`;
        } else {
            document.getElementById('msg').innerHTML = `<div class="error">❌ ${data.message}</div>`;
        }
    } catch(err) {
        document.getElementById('msg').innerHTML = `<div class="error">❌ Backend error</div>`;
    }
};
</script>
    <script src="/js/lang.js"></script>
</body>
</html>
